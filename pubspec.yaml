name: tea_minds
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.0
  firebase_core: ^3.0.0      # El motor central
  firebase_auth: ^5.0.0      # Para el Login y el PIN
  cloud_firestore: ^5.0.0    # Para los pollitos y métricas
  google_fonts: ^6.0.0       # Tipografía clara (Accesibilidad)
  fl_chart: ^0.70.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1 # <--- Herramienta para cambiar el icono añadida aquí

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/pollitos/

# --- CONFIGURACIÓN DEL ICONO DE LA APP ---
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png" # <--- Asegúrate de que tienes esta imagen guardada